<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The Judge helps you take back your screen time.">
    <link rel="stylesheet" href="styles.css">
    <title>The Judge — Your screen time is on trial.</title>
</head>
<body>
    <header>
        <span>The Judge</span>
        <a href="#">Privacy</a>
    </header>

    <main>
        <section class="screen">
            <div class="case">
                <p class="ruling">The Judge has spoken.</p>
                <p class="timer" aria-label="No screen time remaining">00:00</p>
                <p class="note">Your daily time is up.</p>
            </div>

            <div class="appeal">
                <span>Need more time?</span>
                <p>Make your case to The Judge.</p>
                <a href="#">Join the Android beta</a>
            </div>
        </section>
    </main>

    <footer>
        <span>An app for using less app.</span>
        <a href="#">Contact</a>
    </footer>
</body>
</html>
