<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The Judge helps you take back your screen time.">
    <link rel="stylesheet" href="styles.css">
    <title>The Judge | Your screen time is on trial.</title>
</head>
<body>
    <header>
        <span>The Judge</span>
        <a href="privacy.html">Privacy</a>
    </header>

    <main>
        <section class="screen">
            <div class="case">
                <p class="ruling">The Judge has spoken.</p>
                <p class="timer" aria-label="No screen time remaining">00:00</p>
                <p class="note">Your daily screen time is up.</p>
            </div>

            <div class="appeal">
                <span>Need more time?</span>
                <p>Make your case to The Judge.</p>
                <a href="android-beta.html">Join the Android beta</a>
            </div>
        </section>
    </main>

    <footer>
        <span>Do something else.</span>
        <a href="contact.html">Contact</a>
    </footer>
    <script>
        const timer = document.querySelector(".timer");
        const duration = 500;
        const start = performance.now();

        function countDown(now) {
            const progress = Math.min((now - start) / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            const seconds = Math.ceil(600 * (1 - eased));
            const minutes = Math.floor(seconds / 60);
            const remainder = seconds % 60;

            timer.textContent = `${String(minutes).padStart(2, "0")}:${String(remainder).padStart(2, "0")}`;

            if (progress < 1) {
                requestAnimationFrame(countDown);
            } else {
                timer.textContent = "00:00";
            }
        }

        if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
            timer.textContent = "00:00";
        } else {
            timer.textContent = "10:00";
            requestAnimationFrame(countDown);
        }
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
